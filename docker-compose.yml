services:

  rss-bot:
    build: .
    restart: unless-stopped
    volumes:
      - rss-bot-data:/data
    environment:
      - INTERVAL_MIN=30
      - BATCH_SIZE=50
      - MAX_POSTS_PER_RUN=5
      - MIN_SCORE=5
      - TZ_OFFSET=3
      - FRESHRSS_CATEGORY=Technology
      - BLACKLIST_SOURCES=smallbusiness,r/smallbusiness
      - STATS_HOUR=9
      - DIGEST_HOUR=20
      - DIGEST_COUNT=5
      - KEEP_DAYS=30
      - DB_PATH=/data/news.db

volumes:
  rss-bot-data:
