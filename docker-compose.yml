services:

  rss-bot:
    build: .
    restart: unless-stopped
    volumes:
      - ./data:/data
    env_file:
      - .env
    environment:
      - INTERVAL_MIN=30
      - BATCH_SIZE=50
      - MAX_POSTS_PER_RUN=5
      - MIN_SCORE=5
      - TZ_OFFSET=3
      - FRESHRSS_CATEGORY=Technology
      - BLACKLIST_SOURCES=smallbusiness,r/smallbusiness
      - STATS_HOUR=9
      - DIGEST_HOUR=20       # дайджест топ-5 новостей в 20:00
      - DIGEST_COUNT=5
      - KEEP_DAYS=30          # чистить старые записи через 30 дней
      - DB_PATH=/data/news.db

